# =============================================================================
# FINANZAS FAMILIARES - PowerSync Sync Rules
# Archivo: sync_rules.yaml
# Descripción: Define qué datos sincronizar para cada usuario
# =============================================================================
#
# Documentación: https://docs.powersync.com/usage/sync-rules
#
# Este archivo define las reglas de sincronización para PowerSync.
# Cada usuario solo sincroniza sus propios datos (filtrado por user_id).
#
# IMPORTANTE: Las columnas aquí deben coincidir exactamente con:
# - supabase/migrations/001_initial_schema.sql
# - lib/data/sync/powersync_schema.dart
#

bucket_definitions:
  # ---------------------------------------------------------------------------
  # Bucket: Datos del Usuario
  # Sincroniza todas las tablas pertenecientes al usuario autenticado
  # ---------------------------------------------------------------------------
  user_data:
    # Define los parámetros del bucket
    parameters:
      - SELECT token_parameters.user_id AS user_id

    # ---------------------------------------------------------------------------
    # Categorías
    # Incluye categorías del usuario Y categorías del sistema (is_system = true)
    # ---------------------------------------------------------------------------
    data:
      - SELECT
          id,
          name,
          icon,
          type,
          parent_id,
          level,
          sort_order,
          is_active,
          is_system,
          created_at,
          updated_at
        FROM categories
        WHERE user_id = bucket.user_id OR is_system = true

      # ---------------------------------------------------------------------------
      # Cuentas / Billeteras
      # ---------------------------------------------------------------------------
      - SELECT
          id,
          name,
          icon,
          category_id,
          balance,
          currency,
          color,
          description,
          include_in_total,
          is_active,
          created_at,
          updated_at
        FROM accounts
        WHERE user_id = bucket.user_id

      # ---------------------------------------------------------------------------
      # Lugares
      # ---------------------------------------------------------------------------
      - SELECT
          id,
          name,
          icon,
          address,
          latitude,
          longitude,
          is_favorite,
          visit_count,
          last_visited_at,
          is_active,
          created_at,
          updated_at
        FROM places
        WHERE user_id = bucket.user_id

      # ---------------------------------------------------------------------------
      # Métodos de Pago
      # ---------------------------------------------------------------------------
      - SELECT
          id,
          name,
          icon,
          type,
          account_id,
          is_default,
          is_active,
          created_at,
          updated_at
        FROM payment_methods
        WHERE user_id = bucket.user_id

      # ---------------------------------------------------------------------------
      # Unidades de Medida
      # Incluye unidades del usuario Y unidades del sistema
      # ---------------------------------------------------------------------------
      - SELECT
          id,
          name,
          abbreviation,
          type,
          conversion_factor,
          base_unit_id,
          is_system,
          is_active,
          created_at,
          updated_at
        FROM measurement_units
        WHERE user_id = bucket.user_id OR is_system = true

      # ---------------------------------------------------------------------------
      # Transacciones
      # ---------------------------------------------------------------------------
      - SELECT
          id,
          type,
          amount,
          description,
          from_account_id,
          to_account_id,
          category_id,
          place_id,
          transaction_date,
          is_confirmed,
          has_details,
          item_count,
          sync_status,
          created_at,
          updated_at
        FROM transactions
        WHERE user_id = bucket.user_id

      # ---------------------------------------------------------------------------
      # Detalles de Transacciones (Shopping Cart)
      # ---------------------------------------------------------------------------
      - SELECT
          id,
          transaction_id,
          category_id,
          description,
          quantity,
          unit_id,
          unit_price,
          total_price,
          sort_order,
          created_at,
          updated_at
        FROM transaction_details
        WHERE user_id = bucket.user_id

      # ---------------------------------------------------------------------------
      # Presupuestos
      # ---------------------------------------------------------------------------
      - SELECT
          id,
          category_id,
          amount,
          month,
          year,
          is_active,
          created_at,
          updated_at
        FROM budgets
        WHERE user_id = bucket.user_id

      # ---------------------------------------------------------------------------
      # Asientos Contables (Journal Entries)
      # ---------------------------------------------------------------------------
      - SELECT
          id,
          transaction_id,
          account_id,
          entry_type,
          amount,
          description,
          created_at
        FROM journal_entries
        WHERE user_id = bucket.user_id
