name: finanzas_familiares
description: App de finanzas personales y familiares multiplataforma con soporte offline-first.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.9.0

  # Local Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # UI
  fl_chart: ^0.70.2
  intl: ^0.20.2

  # Utils
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  drift_dev: ^2.23.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
