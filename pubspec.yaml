name: finanzas_familiares
description: App de finanzas personales y familiares con Asistente IA.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.9.0

  # Local Database (Offline-First)
  powersync: ^1.10.3
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # UI
  fl_chart: ^0.70.2
  flutter_markdown: ^0.7.4
  intl: ^0.20.2

  # Auth
  google_sign_in: ^6.2.2

  # Utils
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  drift_dev: ^2.23.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
